<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Rock Paper Scissors</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #667eea, #764ba2);
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  background: white;
  padding: 30px;
  border-radius: 20px;
  width: 350px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

h1 {
  margin-bottom: 10px;
}

.score {
  margin: 10px 0;
  font-weight: bold;
}

.choices {
  display: flex;
  justify-content: space-between;
  margin: 20px 0;
}

.choice {
  cursor: pointer;
  border-radius: 15px;
  padding: 10px;
  transition: 0.3s;
}

.choice img {
  width: 80px;
  height: 80px;
}

.choice:hover {
  transform: scale(1.1);
  background: #f0f0f0;
}

.selected {
  border: 3px solid #667eea;
}

.result {
  margin-top: 15px;
  font-size: 18px;
  font-weight: bold;
}

.computer-choice img {
  width: 70px;
  margin-top: 10px;
}

button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  background: #667eea;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #5a67d8;
}
</style>
</head>

<body>

<div class="container">
  <h1>🎮 RPS Game</h1>

  <div class="score" id="score">You: 0 | Computer: 0</div>

  <div class="choices">
    <div class="choice" onclick="playGame('rock', this)">
      <img src="rock.jpeg">
    </div>
    <div class="choice" onclick="playGame('paper', this)">
      <img src="paper.jpeg">
    </div>
    <div class="choice" onclick="playGame('scissors', this)">
      <img src="scissors.jpeg">
    </div>
  </div>

  <div class="result" id="result">Choose your move</div>

  <div class="computer-choice" id="computerChoice"></div>

  <button onclick="resetGame()">Reset</button>
</div>

<script>
let userScore = 0;
let computerScore = 0;

function playGame(userChoice, element) {
  const choices = ['rock', 'paper', 'scissors'];
  const computerChoice = choices[Math.floor(Math.random() * 3)];

  // Remove previous selection
  document.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
  element.classList.add('selected');

  let result = '';

  if (userChoice === computerChoice) {
    result = "It's a Draw!";
  } else if (
    (userChoice === 'rock' && computerChoice === 'scissors') ||
    (userChoice === 'paper' && computerChoice === 'rock') ||
    (userChoice === 'scissors' && computerChoice === 'paper')
  ) {
    result = "You Win!";
    userScore++;
  } else {
    result = "Computer Wins!";
    computerScore++;
  }

  document.getElementById('result').innerText =
    `${result}`;

  document.getElementById('score').innerText =
    `You: ${userScore} | Computer: ${computerScore}`;

  document.getElementById('computerChoice').innerHTML =
    `<p>Computer chose:</p><img src="${computerChoice}.jpeg">`;
}

function resetGame() {
  userScore = 0;
  computerScore = 0;
  document.getElementById('score').innerText = `You: 0 | Computer: 0`;
  document.getElementById('result').innerText = "Choose your move";
  document.getElementById('computerChoice').innerHTML = "";
  document.querySelectorAll('.choice').forEach(c => c.classList.remove('selected'));
}
</script>

</body>
</html>
