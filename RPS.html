<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rock Paper Scissors</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #f4f4f4;
    }

    h1 {
      margin-top: 20px;
    }

    .choices img {
      width: 120px;
      height: 120px;
      margin: 15px;
      cursor: pointer;
      border-radius: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .choices img:hover {
      transform: scale(1.1);
      box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
    }

    .result {
      margin-top: 30px;
      font-size: 20px;
    }

    .score {
      margin-top: 15px;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <h1>Rock Paper Scissors</h1>

  <div class="choices">
    <img src="rock.jpeg" alt="Rock" onclick="playGame('rock')">
    <img src="paper.jpeg" alt="Paper" onclick="playGame('paper')">
    <img src="scissors.jpeg" alt="Scissors" onclick="playGame('scissors')">
  </div>

  <div class="result" id="result">Choose your move!</div>
  <div class="score" id="score">You: 0 | Computer: 0</div>

  <script>
    let userScore = 0;
    let computerScore = 0;

    function playGame(userChoice) {
      const choices = ['rock', 'paper', 'scissors'];
      const computerChoice = choices[Math.floor(Math.random() * 3)];

      let result = '';

      if (userChoice === computerChoice) {
        result = "It's a draw!";
      } else if (
        (userChoice === 'rock' && computerChoice === 'scissors') ||
        (userChoice === 'paper' && computerChoice === 'rock') ||
        (userChoice === 'scissors' && computerChoice === 'paper')
      ) {
        result = "You win!";
        userScore++;
      } else {
        result = "Computer wins!";
        computerScore++;
      }

      document.getElementById('result').innerText =
        `You chose ${userChoice}, Computer chose ${computerChoice}. ${result}`;

      document.getElementById('score').innerText =
        `You: ${userScore} | Computer: ${computerScore}`;
    }
  </script>

</body>
</html>
